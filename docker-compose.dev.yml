# Extensão do docker-compose.yml para desenvolvimento
services:
  # MongoDB para desenvolvimento
  mongodb:
    image: mongo:7.0
    container_name: empatia-mongodb-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-empatia}
      DOCKER_ENV: "true"
    volumes:
      - mongodb_data_dev:/data/db
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - empatia-network

  # MongoDB Express (interface web para MongoDB) - Mantendo para desenvolvimento
  mongo-express:
    image: mongo-express:1.0.2
    container_name: empatia-mongo-express-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${ME_CONFIG_MONGODB_ADMINUSERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${ME_CONFIG_MONGODB_ADMINPASSWORD:-admin123}
      - ME_CONFIG_MONGODB_SERVER=${ME_CONFIG_MONGODB_SERVER:-mongodb}
      - ME_CONFIG_MONGODB_PORT=${ME_CONFIG_MONGODB_PORT:-27017}
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD:-admin123}
      # Melhorar performance e timeout
      - ME_CONFIG_REQUEST_SIZE=100mb
      - ME_CONFIG_SITE_GRIDFS_ENABLED=true
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      # Corrigir problemas de compatibilidade
      - ME_CONFIG_OPTIONS_EDITORTHEME=default
      - ME_CONFIG_SITE_SSL_ENABLED=false
      - ME_CONFIG_MONGODB_CONNECTION_TIMEOUT=5000
    depends_on:
      - mongodb
    networks:
      - empatia-network

  # Redis - Cache e Sessões
  redis:
    image: redis:7-alpine
    container_name: empatia-redis-dev
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - empatia-network
    command: redis-server --appendonly yes

  gateway:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
      network: host
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - MONGODB_URL=${MONGODB_URL:-mongodb://admin:admin123@mongodb:27017/empatia?authSource=admin}
      - DATABASE_NAME=${DATABASE_NAME:-empatia}
      - SQL_DEBUG=${DEBUG:-true}
      - VOICE_SERVICE_URL=${VOICE_SERVICE_URL:-http://voice-service:8004}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:7860,http://localhost:3000}
      - HOT_RELOAD=${HOT_RELOAD:-true}
    volumes:
      - ./data/tts_output:/app/tts_output
      - ./services/gateway-service/src:/app/src
    ports: !override
      - "127.0.0.1:${GATEWAY_PORT:-8000}:8000"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]
    depends_on:
      - mongodb
      - redis
      - voice-service
    networks:
      - empatia-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
      network: host
      args:
        AI_SERVICE_BASE_IMAGE: ${AI_SERVICE_BASE_IMAGE:-nvidia/cuda:12.4.1-devel-ubuntu22.04}
        ENABLE_LOCAL_LLM: ${ENABLE_LOCAL_LLM:-true}
        LOCAL_MODEL_REPO_ID: ${LOCAL_MODEL_REPO_ID:-ggml-org/gemma-4-E4B-it-GGUF}
        LOCAL_MODEL_INCLUDE: ${LOCAL_MODEL_INCLUDE:-gemma-4-E4B-it-Q4_K_M.gguf}
        LOCAL_MODEL_DIR: ${LOCAL_MODEL_DIR:-/models/local-llm}
        LLAMA_CPP_CUDA: ${LLAMA_CPP_CUDA:-true}
        LLAMA_CPP_VERSION: ${LLAMA_CPP_VERSION:-0.3.7}
        LLAMA_CPP_CMAKE_ARGS: ${LLAMA_CPP_CMAKE_ARGS:--DGGML_CUDA=on -DCMAKE_CUDA_ARCHITECTURES=86}
        LLAMA_CPP_PIP_EXTRA_ARGS: ${LLAMA_CPP_PIP_EXTRA_ARGS:-}
      secrets: !override
        - hf_token
        - hugging_face_token
        - huggin_face_token
    ports: !override
      - "127.0.0.1:${AI_SERVICE_PORT:-8001}:8001"
    volumes: !override
      - ./services/ai-service:/app
      - ./services/ai-service/src:/app/src
      - local_llm_models_dev:${LOCAL_MODEL_DIR:-/models/local-llm}
      - ${LOCAL_MODEL_SOURCE_DIR:-/home/toni/.lmstudio/models}:${LOCAL_MODEL_IMPORT_DIR:-/host-lmstudio-models}:ro
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - LLM_PROVIDER=${LLM_PROVIDER:-local}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-openai}
      - LOCAL_MODEL_DOWNLOAD_REQUIRED=${LOCAL_MODEL_DOWNLOAD_REQUIRED:-false}
      - LOCAL_MODEL_DIR=${LOCAL_MODEL_DIR:-/models/local-llm}
      - LOCAL_MODEL_IMPORT_DIR=${LOCAL_MODEL_IMPORT_DIR:-/host-lmstudio-models}
      - LOCAL_MODEL_IMPORT_PATTERN=${LOCAL_MODEL_IMPORT_PATTERN:-gemma-4-E4B-it-Q4_K_M.gguf}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma4:e4b}
      - LOCAL_LLM_MODEL_PATH=${LOCAL_LLM_MODEL_PATH:-}
      - LOCAL_LLM_CHAT_FORMAT=${LOCAL_LLM_CHAT_FORMAT:-}
      - LOCAL_LLM_N_CTX=${LOCAL_LLM_N_CTX:-8192}
      - LOCAL_LLM_N_GPU_LAYERS=${LOCAL_LLM_N_GPU_LAYERS:--1}
      - LOCAL_LLM_N_THREADS=${LOCAL_LLM_N_THREADS:-8}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      - TEMPERATURE=${TEMPERATURE:-0.3}
      - MAX_TOKENS=${MAX_TOKENS:-700}
      - HOT_RELOAD=${HOT_RELOAD:-true}
      - MONGODB_URI=${MONGODB_URL:-mongodb://admin:admin123@mongodb:27017/empatia?authSource=admin}
      - DATABASE_NAME=${DATABASE_NAME:-empatia}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--log-level", "debug"]
    gpus: !override ${AI_SERVICE_GPUS:-all}
    depends_on:
      - mongodb
      - redis
    networks:
      - empatia-network

  avatar-service:
    build:
      context: ./services/avatar-service
      dockerfile: Dockerfile
      network: host
    ports:
      - "127.0.0.1:${AVATAR_SERVICE_PORT:-8002}:8002"
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - DID_API_USERNAME=${DID_API_USERNAME:-}
      - DID_API_PASSWORD=${DID_API_PASSWORD:-}
      - HOT_RELOAD=${HOT_RELOAD:-true}
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network

  emotion-service:
    build:
      context: ./services/emotion-service
      dockerfile: Dockerfile
      network: host
    environment:
      # Configurações NVIDIA para Docker CE
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Configurações do serviço
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - OPENFACE_MODEL_PATH=${OPENFACE_MODEL_PATH:-/models/openface}
      - EMOTION_CONFIDENCE_THRESHOLD=${EMOTION_CONFIDENCE_THRESHOLD:-0.7}
      - HOT_RELOAD=${HOT_RELOAD:-true}
      # EmotiEffLib específicas
      - USE_LEGACY_LANDMARKS=${USE_LEGACY_LANDMARKS:-false}
      - EMOTIEFF_MODEL=${EMOTIEFF_MODEL:-enet_b0_8_best_afew}
      - TORCH_HOME=/app/models
      - HF_HOME=/app/models/huggingface
      # Configurações GPU/CUDA otimizadas para TensorFlow
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_XLA_FLAGS=--tf_xla_enable_xla_devices
      - CUDA_CACHE_DISABLE=0
      - CUDA_CACHE_MAXSIZE=2147483648
      # Configurações de memória GPU para evitar OOM
      - TF_GPU_MEMORY_ALLOW_GROWTH=true
      # Forçar TensorFlow a usar GPU
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./services/emotion-service/src:/app/src
      # Volume para modelos pré-treinados
      - ./data/emotion_models:/app/models
    ports: !override
      - "127.0.0.1:${EMOTION_SERVICE_PORT:-8003}:8003"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network

  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
      network: host
    container_name: empatia-voice-service-dev
    ports: !override
      - "127.0.0.1:${VOICE_SERVICE_PORT:-8004}:8004"
    environment:
      # Configurações básicas
      - PYTHONPATH=/app
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      
      # Configurações Google Cloud Text-to-Speech
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/empathia-462921-734245aa641d.json
      - TTS_OUTPUT_DIR=/app/output
      - VOICE_SERVICE_BASE_URL=http://localhost:8004
      
      # Configurações do serviço
      - HOST=0.0.0.0
      - PORT=8004
      - WORKERS=1
      - HOT_RELOAD=${HOT_RELOAD:-true}
    volumes:
      # Volume para desenvolvimento (hot reload)
      - ./services/voice-service/src:/app/src
      # Volume compartilhado para arquivos de áudio
      - ./data/tts_output:/app/output
      # Volume para credenciais do GCP (mapeando o arquivo JSON real)
      - ./services/voice-service/credentials/empathia-462921-734245aa641d.json:/app/credentials/empathia-462921-734245aa641d.json:ro
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8004", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web-ui:
    build:
      context: ./apps/web-ui
      dockerfile: Dockerfile.dev
      network: host
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - BACKEND_URL=${BACKEND_URL:-http://gateway-service:8000}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
      - VITE_GOOGLE_REDIRECT_URI=${VITE_GOOGLE_REDIRECT_URI:-http://localhost:7860}
    volumes:
      - ./apps/web-ui/src:/app/src
      - ./apps/web-ui/public:/app/public
    ports: !override
      - "127.0.0.1:${WEB_UI_PORT:-7860}:3000"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    networks:
      - empatia-network

  admin-panel:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile.dev
      network: host
    container_name: empatia-admin-panel-dev
    ports: !override
      - "127.0.0.1:${ADMIN_PANEL_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
      - VITE_EMOTION_SERVICE_URL=http://localhost:8003
      - VITE_VOICE_SERVICE_URL=http://localhost:8004
      - VITE_AI_SERVICE_URL=http://localhost:8001
      - VITE_AVATAR_SERVICE_URL=http://localhost:8002
      - BACKEND_URL=${BACKEND_URL:-http://gateway-service:8000}
    depends_on:
      - gateway
      - emotion-service
      - ai-service
      - voice-service
    networks:
      - empatia-network
    volumes:
      - ./apps/admin-panel/src:/app/src
      - ./apps/admin-panel/public:/app/public

# Volumes para dados persistentes
volumes:
  mongodb_data_dev:
  local_llm_models_dev:
  redis_data_dev:
  postgres_data_dev:
  # Novos volumes para o voice-service
  voice_output_dev:
  f5_tts_cache_dev:
  torch_cache_dev:

# Rede para comunicação entre serviços
networks:
  empatia-network:
    driver: bridge 

secrets:
  hf_token:
    environment: HF_TOKEN
  hugging_face_token:
    environment: HUGGING_FACE_TOKEN
  huggin_face_token:
    environment: HUGGIN_FACE_TOKEN
