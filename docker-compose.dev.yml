# Extensão do docker-compose.yml para desenvolvimento
services:
  # MongoDB para desenvolvimento
  mongodb:
    image: mongo:7.0
    container_name: empatia-mongodb-dev
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-empatia_db}
      DOCKER_ENV: "true"
    volumes:
      - mongodb_data_dev:/data/db
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - empatia-network

  # MongoDB Express (interface web para MongoDB)
  mongo-express:
    image: mongo-express:1.0.0
    container_name: empatia-mongo-express-dev
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${ME_CONFIG_MONGODB_ADMINUSERNAME:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${ME_CONFIG_MONGODB_ADMINPASSWORD:-admin123}
      - ME_CONFIG_MONGODB_SERVER=${ME_CONFIG_MONGODB_SERVER:-mongodb}
      - ME_CONFIG_MONGODB_PORT=${ME_CONFIG_MONGODB_PORT:-27017}
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD:-admin123}
    depends_on:
      - mongodb
    networks:
      - empatia-network

  # Redis - Cache e Sessões
  redis:
    image: redis:7-alpine
    container_name: empatia-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - empatia-network
    command: redis-server --appendonly yes

  gateway:
    build:
      context: ./services/gateway-service
      dockerfile: Dockerfile
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - MONGODB_URL=${MONGODB_URL:-mongodb://admin:admin123@mongodb:27017/empatia_db?authSource=admin}
      - DATABASE_NAME=${DATABASE_NAME:-empatia_db}
      - SQL_DEBUG=${DEBUG:-true}
      - VOICE_SERVICE_URL=${VOICE_SERVICE_URL:-http://voice-service:8004}
    volumes:
      - ./data/tts_output:/app/tts_output
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "debug"]
    depends_on:
      - mongodb
      - redis
      - voice-service
    networks:
      - empatia-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    ports:  
      - "${AI_SERVICE_PORT:-8001}:8001"
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network

  avatar-service:
    build:
      context: ./services/avatar-service 
      dockerfile: Dockerfile
    ports:
      - "${AVATAR_SERVICE_PORT:-8002}:8002"
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - DID_API_USERNAME=${DID_API_USERNAME:-}
      - DID_API_PASSWORD=${DID_API_PASSWORD:-}
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network

  emotion-service:
    build:
      context: ./services/emotion-service
      dockerfile: Dockerfile
    environment:
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    volumes:
      - ./services/emotion-service/src:/app/src
    ports:
      - "${EMOTION_SERVICE_PORT:-8003}:8003"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network

  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: empatia-voice-service-dev
    ports:
      - "${VOICE_SERVICE_PORT:-8004}:8004"
    environment:
      # Configurações básicas
      - PYTHONPATH=/app
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      
      # Configurações F5-TTS
      - F5_TTS_MODEL=${F5_TTS_MODEL:-firstpixel/F5-TTS-pt-br}
      - F5_TTS_DEVICE=${F5_TTS_DEVICE:-cpu}
      - F5_TTS_OUTPUT_DIR=/app/tts_output
      
      # Configurações de cache
      - HF_HOME=/tmp/huggingface_cache
      - TRANSFORMERS_CACHE=/tmp/transformers_cache
      - TORCH_HOME=/tmp/torch_cache
      
      # Configurações do serviço
      - VOICE_SERVICE_HOST=0.0.0.0
      - VOICE_SERVICE_PORT=8004
      - VOICE_SERVICE_BASE_URL=${VOICE_SERVICE_BASE_URL:-http://localhost:8004}
    volumes:
      # Volume para desenvolvimento (hot reload)
      - ./services/voice-service/src:/app/src
      # Volume compartilhado para arquivos de áudio - mapeado para diretório local
      - ./data/tts_output:/app/tts_output
      # Cache volumes para melhor performance
      - f5_tts_cache_dev:/tmp/huggingface_cache
      - torch_cache_dev:/tmp/torch_cache
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8004", "--reload", "--log-level", "debug"]
    networks:
      - empatia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  web-ui:
    build:
      context: ./apps/web-ui
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./apps/web-ui/src:/app/src
      - ./apps/web-ui/public:/app/public
      - /app/node_modules
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    networks:
      - empatia-network

  admin-panel:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile.dev
    ports:
      - "${ADMIN_PANEL_PORT:-3001}:3001"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
      - VITE_EMOTION_SERVICE_URL=http://localhost:8003
      - VITE_VOICE_SERVICE_URL=http://localhost:8004
      - VITE_AI_SERVICE_URL=http://localhost:8001
      - VITE_AVATAR_SERVICE_URL=http://localhost:8002
    depends_on:
      - gateway
      - emotion-service
      - ai-service
      - voice-service
    networks:
      - empatia-network
    volumes:
      - ./apps/admin-panel/src:/app/src
      - ./apps/admin-panel/public:/app/public
      - /app/node_modules

  admin-panel-dev:
    build:
      context: ./apps/admin-panel
      dockerfile: Dockerfile.dev
    container_name: empatia-admin-panel-dev
    ports:
      - "3011:3011"
    volumes:
      - ./apps/admin-panel:/app
      - /app/node_modules
    networks:
      - empatia-network

# Volumes para dados persistentes
volumes:
  mongodb_data_dev:
  redis_data_dev:
  postgres_data_dev:
  # Novos volumes para o voice-service
  voice_output_dev:
  f5_tts_cache_dev:
  torch_cache_dev:

# Rede para comunicação entre serviços
networks:
  empatia-network:
    driver: bridge 