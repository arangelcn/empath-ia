services:
  # MongoDB - Banco principal para persistência
  mongodb:
    image: mongo:7.0
    container_name: empatia-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-empatia}
    volumes:
      - mongodb_data:/data/db
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - empatia-network

  # Gateway Service - Ponto de entrada principal
  gateway:
    build: ./services/gateway-service
    container_name: empatia-gateway
    env_file:
      - .env
    environment:
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8001}
      - AVATAR_SERVICE_URL=${AVATAR_SERVICE_URL:-http://avatar-service:8002}
      - EMOTION_SERVICE_URL=${EMOTION_SERVICE_URL:-http://emotion-service:8003}
      - VOICE_SERVICE_URL=${VOICE_SERVICE_URL:-http://voice-service:8004}
      - MONGODB_URL=${MONGODB_URL:-mongodb://admin:admin123@mongodb:27017/empatia?authSource=admin}
      - DATABASE_NAME=${DATABASE_NAME:-empatia}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - SECRET_KEY=${SECRET_KEY:-changeme-must-be-at-least-32-characters-long!}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
    volumes:
      - ./services/gateway-service:/app
      - ./data/shared:/shared_data
      - ./data/uploads:/uploads
      - ./data/tts_output:/app/tts_output
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      - mongodb
      - ai-service
      - avatar-service
      - emotion-service
      - voice-service
    networks:
      - empatia-network
    develop:
      watch:
        - action: sync
          path: ./services/gateway-service/src
          target: /app/src
          ignore:
            - __pycache__/

  # AI Service - OpenAI e Psicólogo Rogers
  ai-service:
    build:
      context: ./services/ai-service
      args:
        ENABLE_LOCAL_LLM: ${ENABLE_LOCAL_LLM:-true}
        LOCAL_MODEL_REPO_ID: ${LOCAL_MODEL_REPO_ID:-ggml-org/gemma-4-E4B-it-GGUF}
        LOCAL_MODEL_INCLUDE: ${LOCAL_MODEL_INCLUDE:-gemma-4-E4B-it-Q4_K_M.gguf}
        LOCAL_MODEL_DIR: ${LOCAL_MODEL_DIR:-/models/local-llm}
        LLAMA_CPP_PIP_EXTRA_ARGS: ${LLAMA_CPP_PIP_EXTRA_ARGS:-}
        LOCAL_MODEL_DOWNLOAD_REQUIRED: ${LOCAL_MODEL_DOWNLOAD_REQUIRED:-true}
      secrets:
        - hf_token
        - hugging_face_token
        - huggin_face_token
    container_name: empatia-ai-service
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - LLM_PROVIDER=${LLM_PROVIDER:-local}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-openai}
      - LOCAL_MODEL_DIR=${LOCAL_MODEL_DIR:-/models/local-llm}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma4:e4b}
      - LOCAL_LLM_MODEL_PATH=${LOCAL_LLM_MODEL_PATH:-}
      - LOCAL_LLM_CHAT_FORMAT=${LOCAL_LLM_CHAT_FORMAT:-}
      - LOCAL_LLM_N_CTX=${LOCAL_LLM_N_CTX:-8192}
      - LOCAL_LLM_N_GPU_LAYERS=${LOCAL_LLM_N_GPU_LAYERS:--1}
      - LOCAL_LLM_N_THREADS=${LOCAL_LLM_N_THREADS:-8}
      - TEMPERATURE=${TEMPERATURE:-0.3}
      - MAX_TOKENS=${MAX_TOKENS:-700}
      - AI_SERVICE_PORT=${AI_SERVICE_PORT:-8001}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MONGODB_URI=${MONGODB_URL:-mongodb://admin:admin123@mongodb:27017/empatia?authSource=admin}
      - DATABASE_NAME=${DATABASE_NAME:-empatia}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./services/ai-service:/app
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"
    depends_on:
      - mongodb
    networks:
      - empatia-network
    develop:
      watch:
        - action: sync
          path: ./services/ai-service/src
          target: /app/src
          ignore:
            - __pycache__/

  # Avatar Service - DID-AI
  avatar-service:
    build: ./services/avatar-service
    container_name: empatia-avatar-service
    env_file:
      - .env
    environment:
      - DID_API_USERNAME=${DID_API_USERNAME:-}
      - DID_API_PASSWORD=${DID_API_PASSWORD:-}
      - AVATAR_SERVICE_PORT=${AVATAR_SERVICE_PORT:-8002}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/avatar-service:/app
    networks:
      - empatia-network
    develop:
      watch:
        - action: sync
          path: ./services/avatar-service/src
          target: /app/src
          ignore:
            - __pycache__/

  # Emotion Service - OpenFace
  emotion-service:
    build: ./services/emotion-service
    container_name: empatia-emotion-service
    env_file:
      - .env
    environment:
      - OPENFACE_MODEL_PATH=${OPENFACE_MODEL_PATH:-/models/openface}
      - EMOTION_CONFIDENCE_THRESHOLD=${EMOTION_CONFIDENCE_THRESHOLD:-0.7}
      - EMOTION_SERVICE_PORT=${EMOTION_SERVICE_PORT:-8003}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/emotion-service:/app
      - ./data/shared:/shared_data
    ports:
      - "${EMOTION_SERVICE_PORT:-8003}:8003"
    networks:
      - empatia-network
    develop:
      watch:
        - action: sync
          path: ./services/emotion-service/src
          target: /app/src
          ignore:
            - __pycache__/

  # Voice Service - Google Cloud Text-to-Speech
  voice-service:
    build: ./services/voice-service
    container_name: empatia-voice-service
    env_file:
      - .env
    environment:
      - VOICE_SERVICE_PORT=${VOICE_SERVICE_PORT:-8004}
      - VOICE_SERVICE_BASE_URL=${VOICE_SERVICE_BASE_URL:-http://voice-service:8004}
      # Configurações Google Cloud Text-to-Speech
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/empathia-462921-28cb9105b799.json
      - TTS_OUTPUT_DIR=/app/output
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./services/voice-service:/app
      - ./data/tts_output:/app/output
      # Volume para credenciais do GCP
      - ./services/voice-service/credentials/empathia-462921-28cb9105b799.json:/app/credentials/empathia-462921-28cb9105b799.json:ro
    ports:
      - "${VOICE_SERVICE_PORT:-8004}:8004"
    networks:
      - empatia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    develop:
      watch:
        - action: sync
          path: ./services/voice-service/src
          target: /app/src
          ignore:
            - __pycache__/

  # Web UI - React + Vite Frontend
  web-ui:
    build:
      context: ./apps/web-ui
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_VOICE_URL: ${VITE_VOICE_URL:-}
    container_name: empatia-web-ui
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_URL=${BACKEND_URL:-http://gateway-service:8000}
    ports:
      - "${WEB_UI_PORT:-7860}:3000"
    depends_on:
      - gateway
    networks:
      - empatia-network

  # Admin Panel - React + Vite Frontend
  admin-panel:
    build: ./apps/admin-panel
    container_name: empatia-admin-panel
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
      - BACKEND_URL=${BACKEND_URL:-http://gateway-service:8000}
    ports:
      - "${ADMIN_PANEL_PORT:-3001}:3000"
    depends_on:
      - gateway
    networks:
      - empatia-network

  # OpenFace - Análise Facial (sob demanda)
  openface:
    build: ./infrastructure/docker/base/openface-base
    container_name: empatia-openface
    volumes:
      - ./data/shared:/data
    networks:
      - empatia-network
    profiles:
      - tools
    restart: "no"

  # Redis - Cache e Sessões
  redis:
    image: redis:7-alpine
    container_name: empatia-redis
    volumes:
      - redis_data:/data
    networks:
      - empatia-network
    command: redis-server --appendonly yes

  # PostgreSQL - Banco de dados (opcional)
  postgres:
    image: postgres:15-alpine
    container_name: empatia-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-empatia}
      - POSTGRES_USER=${POSTGRES_USER:-empatia_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-strong_password_here}
      - DATABASE_URL=${DATABASE_URL:-postgresql://empatia_user:strong_password_here@db:5432/empatia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - empatia-network
    profiles:
      - database

networks:
  empatia-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  voice_cache:  # Cache para modelos TTS

secrets:
  hf_token:
    environment: HF_TOKEN
  hugging_face_token:
    environment: HUGGING_FACE_TOKEN
  huggin_face_token:
    environment: HUGGIN_FACE_TOKEN
