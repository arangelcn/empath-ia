name: Deploy → GKE (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: "Forçar redeploy mesmo sem mudanças de imagem"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPO: empatia-images
  CLUSTER_NAME: empatia-cluster
  CLUSTER_REGION: us-central1
  NAMESPACE: empatia

jobs:
  # ---------------------------------------------------------------
  # 1. Build e Push de todas as imagens para o Artifact Registry
  # ---------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read
      id-token: write  # Necessário para Workload Identity Federation

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway-service
            context: services/gateway-service
          - name: ai-service
            context: services/ai-service
          - name: avatar-service
            context: services/avatar-service
          - name: emotion-service
            context: services/emotion-service
          - name: voice-service
            context: services/voice-service
          - name: web-ui
            context: apps/web-ui
          - name: admin-panel
            context: apps/admin-panel

    steps:
      - uses: actions/checkout@v4

      - name: Definir tag da imagem
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # Autenticação sem chaves JSON — via Workload Identity Federation
      - name: Autenticar no GCP (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.name }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # Plataforma única — sem ARM no GKE Autopilot padrão
          platforms: linux/amd64

  # ---------------------------------------------------------------
  # 2. Deploy no GKE Autopilot
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar kubectl para o cluster GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      # Criar/atualizar o Kubernetes Secret com valores do GCP Secret Manager
      - name: Sincronizar secrets do GCP Secret Manager → K8s Secret
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml

          kubectl create secret generic empatia-secrets \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=OPENAI_API_KEY="$(gcloud secrets versions access latest --secret=empatia-openai-api-key --project=${{ env.PROJECT_ID }})" \
            --from-literal=DID_API_USERNAME="$(gcloud secrets versions access latest --secret=empatia-did-api-username --project=${{ env.PROJECT_ID }})" \
            --from-literal=DID_API_PASSWORD="$(gcloud secrets versions access latest --secret=empatia-did-api-password --project=${{ env.PROJECT_ID }})" \
            --from-literal=MONGO_ROOT_PASSWORD="$(gcloud secrets versions access latest --secret=empatia-mongo-root-password --project=${{ env.PROJECT_ID }})" \
            --from-literal=REDIS_PASSWORD="$(gcloud secrets versions access latest --secret=empatia-redis-password --project=${{ env.PROJECT_ID }})" \
            --from-literal=JWT_SECRET_KEY="$(gcloud secrets versions access latest --secret=empatia-jwt-secret-key --project=${{ env.PROJECT_ID }})" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Apply ordenado: infra base → databases → serviços → frontend → ingress
      - name: Apply — Namespace, ServiceAccount, ConfigMap
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/serviceaccount.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml

      - name: Apply — MongoDB e Redis
        run: |
          kubectl apply -f infrastructure/k8s/mongodb/
          kubectl apply -f infrastructure/k8s/redis/

      - name: Aguardar MongoDB estar pronto
        run: |
          kubectl rollout status statefulset/mongodb \
            --namespace ${{ env.NAMESPACE }} --timeout=180s

      # Substituir placeholders nas imagens pelos valores reais
      - name: Substituir tags das imagens nos manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY_URL: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}
        run: |
          for svc in gateway ai-service avatar-service emotion-service voice-service web-ui admin-panel; do
            find infrastructure/k8s/$svc -name "deployment.yaml" \
              -exec sed -i \
                -e "s|REGISTRY_URL|${REGISTRY_URL}|g" \
                -e "s|IMAGE_TAG|${IMAGE_TAG}|g" \
                {} \;
          done

      - name: Apply — Serviços backend
        run: |
          kubectl apply -f infrastructure/k8s/gateway/
          kubectl apply -f infrastructure/k8s/ai-service/
          kubectl apply -f infrastructure/k8s/avatar-service/
          kubectl apply -f infrastructure/k8s/emotion-service/
          kubectl apply -f infrastructure/k8s/voice-service/

      - name: Apply — Frontend
        run: |
          kubectl apply -f infrastructure/k8s/web-ui/
          kubectl apply -f infrastructure/k8s/admin-panel/

      - name: Apply — Ingress e Certificados
        run: |
          kubectl apply -f infrastructure/k8s/ingress.yaml

      # Aguardar rollout de todos os Deployments
      - name: Verificar rollout — Gateway
        run: kubectl rollout status deployment/gateway -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Verificar rollout — AI Service
        run: kubectl rollout status deployment/ai-service -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Verificar rollout — Serviços restantes
        run: |
          for dep in avatar-service emotion-service voice-service web-ui admin-panel; do
            echo "→ Verificando $dep..."
            kubectl rollout status deployment/$dep -n ${{ env.NAMESPACE }} --timeout=300s
          done

      - name: Resumo do deploy
        if: always()
        run: |
          echo "=== Pods em execução ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo ""
          echo "=== Serviços ==="
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Certificados Gerenciados ==="
          kubectl get managedcertificate -n ${{ env.NAMESPACE }}
