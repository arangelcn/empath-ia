apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: empatia
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: empatia-app
      containers:
        - name: gateway
          image: REGISTRY_URL/gateway-service:IMAGE_TAG
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: empatia-config
          env:
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: JWT_SECRET_KEY
            - name: MONGODB_URL
              value: "mongodb://admin:$(MONGO_ROOT_PASSWORD)@mongodb:27017/empatia?authSource=admin"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
