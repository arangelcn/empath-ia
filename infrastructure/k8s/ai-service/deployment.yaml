apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: empatia
  labels:
    app: ai-service
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      serviceAccountName: empatia-app
      containers:
        - name: ai-service
          image: REGISTRY_URL/ai-service:IMAGE_TAG
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: empatia-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: OPENAI_API_KEY
            - name: MONGO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: MONGO_ROOT_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: empatia-secrets
                  key: REDIS_PASSWORD
            - name: MONGODB_URI
              value: "mongodb://admin:$(MONGO_ROOT_PASSWORD)@mongodb:27017/empatia?authSource=admin"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
            - name: MODEL_NAME
              value: "gpt-4o"
            - name: AI_SERVICE_PORT
              value: "8001"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
