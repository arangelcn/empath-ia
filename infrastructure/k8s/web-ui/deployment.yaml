apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: empatia
  labels:
    app: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      serviceAccountName: empatia-app
      containers:
        - name: web-ui
          image: REGISTRY_URL/web-ui:IMAGE_TAG
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: empatia-config
                  key: VITE_API_URL
          resources:
            # nginx alpine: muito leve
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
