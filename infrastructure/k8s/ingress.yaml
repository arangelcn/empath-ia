apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: empatia-ingress
  namespace: empatia
  annotations:
    # GKE Managed Certificate — HTTPS automático (sem custo extra de cert-manager)
    networking.gke.io/managed-certificates: empatia-certs
    # GKE Ingress class (usa Cloud Load Balancer — ~$18/mês, mas único para tudo)
    kubernetes.io/ingress.class: "gce"
    # Redirecionar HTTP → HTTPS
    kubernetes.io/ingress.allow-http: "false"
    # Política de backend customizada (opcional: timeout, etc.)
    compute.googleapis.com/neg: '{"ingress": true}'
spec:
  rules:
    # Frontend principal
    - host: app.empatia.ai  # SUBSTITUIR pelo seu domínio real
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
          - path: /voice-service
            pathType: Prefix
            backend:
              service:
                name: voice-service
                port:
                  number: 8004
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000
    # Painel de administração
    - host: admin.empatia.ai  # SUBSTITUIR pelo seu subdomínio real
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 3000
---
# GKE Managed Certificate — provisiona SSL automaticamente via Let's Encrypt / GCP
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: empatia-certs
  namespace: empatia
spec:
  domains:
    - app.empatia.ai    # SUBSTITUIR pelo seu domínio real
    - admin.empatia.ai  # SUBSTITUIR pelo seu subdomínio real
